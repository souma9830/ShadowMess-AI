services:
  neo4j:
    image: neo4j:5.19
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/shadowmesh
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: wget -q --spider http://localhost:7474 || exit 1
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: redis-cli ping || exit 1
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      # Honeypot containers on deception_net reach the backend via the Docker bridge gateway.
      # On Linux: 172.17.0.1. On Docker Desktop (Win/Mac): host.docker.internal resolves automatically.
      HONEYPOT_CALLBACK_URL: "http://172.17.0.1:8000"
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    # network_mode: host required for Scapy (NET_RAW/NET_ADMIN).
    # Backend reaches Neo4j/Redis via localhost since those ports are bound to host.
    network_mode: host
    cap_add:
      - NET_RAW
      - NET_ADMIN
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      # Tells vite.config.js to proxy to the host-networked backend instead of localhost
      VITE_BACKEND_HOST: "host.docker.internal"
    extra_hosts:
      - "host.docker.internal:host-gateway"  # Linux support (Docker Engine 20.10+)
    depends_on:
      - backend

networks:
  deception_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

volumes:
  neo4j_data:
  neo4j_logs:
  redis_data:
