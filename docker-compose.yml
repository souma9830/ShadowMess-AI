services:
  neo4j:
    image: neo4j:5.19
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/shadowmesh
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: wget -q --spider http://localhost:7474 || exit 1
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: redis-cli ping || exit 1
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Orchestrator — SOLE holder of the Docker socket (Task 9.5)
  # The backend talks to this service via HTTP. The socket never leaves here.
  # ---------------------------------------------------------------------------
  orchestrator:
    build: ./orchestrator
    ports:
      - "9000:9000"
    volumes:
      # Docker socket is ONLY mounted here, not in the backend
      - /var/run/docker.sock:/var/run/docker.sock
    user: root
    environment:
      DECEPTION_NETWORK: shadowmesh_deception_net
    networks:
      - deception_net
    healthcheck:
      test: python -c "import urllib.request; urllib.request.urlopen('http://localhost:9000/health')" || exit 1
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      NEO4J_URI: "bolt://neo4j:7687"
      REDIS_URL: "redis://redis:6379"
      HONEYPOT_CALLBACK_URL: "http://backend:8000"
      ORCHESTRATOR_URL: "http://orchestrator:9000"
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
      orchestrator:
        condition: service_healthy
    networks:
      - default
      - deception_net
    cap_add:
      - NET_RAW
      - NET_ADMIN
    # NOTE: Docker socket is intentionally NOT mounted here (Task 9.5)

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_BACKEND_HOST: "backend"
    depends_on:
      - backend

networks:
  deception_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

volumes:
  neo4j_data:
  neo4j_logs:
  redis_data:
